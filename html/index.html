<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SUHRIN HUH</title>
    <link
      href="https://cdn.jsdelivr.net/gh/webfontworld/neodgm/neodgm.css"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link href="/css/style.css" rel="stylesheet" />
    <script src="/script/components.js" defer></script>
    <style>
      /* ============================================
         MINI GAME SECTION
      ============================================ */

      .mini-game-list {
        display: flex;
        align-items: flex-start;
        gap: 0.4rem;
        margin-top: 1.25rem;
        width: 100%;
      }

      .mini-game-card {
        display: flex;
        flex-direction: column;
        flex: 1 1 0%;
        min-width: 0;
        overflow: hidden;
        border: 1px solid var(--line-strong);
        background: var(--bg);
        cursor: pointer;
        transition: border-color 0.2s ease;
      }

      .mini-game-card:hover {
        border-color: var(--accent);
      }

      .mini-game-card:active {
        transform: translateY(1px);
      }

      .mini-game-card:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }

      .mini-game-card-thumb {
        display: block;
        width: 100%;
        aspect-ratio: 1 / 1;
        object-fit: cover;
      }

      .mini-game-card-title {
        display: block;
        padding: 0.4rem 0.5rem;
        font-size: 0.75rem;
        font-weight: 600;
        color: var(--ink-faint);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        transition: color 0.2s ease;
      }

      .mini-game-card:hover .mini-game-card-title {
        color: var(--ink);
      }

      /* ============================================
         WEATHER WIDGET (실시간 세계 날씨 - 지도 + 핀 + 모달)
      ============================================ */

      .world-map {
        position: relative;
        width: 22.75rem;
        max-width: 100%;
        aspect-ratio: 1000 / 699;
        margin-top: 0.75rem;
        border: 1px solid var(--line-strong);
        background: var(--bg);
        overflow: visible;
      }

      .world-map-illustration {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        display: block;
        object-fit: cover;
      }

      .map-pin {
        position: absolute;
        width: 1.8rem;
        height: 1.8rem;
        padding: 0;
        border: none;
        background: none;
        color: #d77411;
        cursor: pointer;
        transform: translate(-50%, -100%);
        transition:
          color 0.2s ease,
          transform 0.2s ease;
        z-index: 2;
      }

      .map-pin svg {
        width: 100%;
        height: 100%;
        display: block;
        fill: currentColor;
        filter: drop-shadow(0 1px 1px rgba(28, 26, 23, 0.3));
      }

      .map-pin:hover {
        color: var(--ink);
        transform: translate(-50%, -100%) scale(1.2);
      }

      .map-pin[aria-expanded="true"] {
        color: var(--ink);
      }

      .map-pin:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }

      .city-modal {
        position: absolute;
        z-index: 5;
        width: 12rem;
        padding: 0.85rem 0.95rem;
        border: 1px solid var(--line-strong);
        background: var(--bg);
        box-shadow: 0 6px 16px rgba(28, 26, 23, 0.18);
      }

      .city-modal-close {
        position: absolute;
        top: 0.35rem;
        right: 0.4rem;
        width: 1.1rem;
        height: 1.1rem;
        padding: 0;
        border: none;
        background: none;
        color: var(--ink-faint);
        font-size: 0.8125rem;
        line-height: 1;
        cursor: pointer;
      }

      .city-modal-close:hover {
        color: var(--ink);
      }

      .city-modal-title {
        font-family: var(--font-display);
        font-weight: 700;
        font-size: 0.875rem;
        margin: 0 1.1rem 0.4rem 0;
      }

      .city-modal-time {
        font-family: var(--font-mono);
        font-size: 0.8125rem;
        color: var(--ink);
        margin: 0;
      }

      .city-modal-divider {
        border: none;
        border-top: 1px dashed var(--line-strong);
        margin: 0.6rem 0;
      }

      .city-modal-list {
        list-style: none;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        gap: 0.3rem;
        font-size: 0.75rem;
        color: var(--ink-soft);
      }

      .city-modal-loading {
        margin: 0;
        font-size: 0.75rem;
        color: var(--ink-faint);
      }

      .city-modal-error {
        margin: 0;
        font-size: 0.75rem;
        color: var(--accent);
      }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="inner">
        <!-- 상단 네비게이션 -->
        <site-header></site-header>
        <!-- 히어로 -->
        <section class="hero">
          <span class="eyebrow">HOME</span>
          <h1 class="hero-title">NEW WORLD</h1>
          <p class="hero-desc">
            일상의 많은 것들에 영감을 받고 이를 기록합니다.
          </p>
        </section>

        <!-- 콘텐츠 -->
        <div class="content">
          <!-- NEWS -->
          <section class="panel featured">
            <div class="featured-texture" aria-hidden="true"></div>
            <span class="eyebrow">NEWS</span>
            <div class="carousel">
              <div class="carousel-viewport">
                <div class="carousel-track" id="track">
                  <article class="carousel-slide">
                    <div class="carousel-card">
                      <span class="date">2026.06.11</span>
                      <h3>여행 앨범 업데이트</h3>
                      <p>홋카이도 대설산 브이로그 영상을 추가했어요.</p>
                    </div>
                  </article>
                  <article class="carousel-slide">
                    <div class="carousel-card">
                      <span class="date">2026.06.11</span>
                      <h3>여행 앨범 업데이트</h3>
                      <p>홋카이도 대설산 브이로그 영상을 추가했어요.</p>
                    </div>
                  </article>
                  <article class="carousel-slide">
                    <div class="carousel-card">
                      <span class="date">2026.06.11</span>
                      <h3>여행 앨범 업데이트</h3>
                      <p>홋카이도 대설산 브이로그 영상을 추가했어요.</p>
                    </div>
                  </article>
                </div>
              </div>
              <div class="carousel-dots" id="dots"></div>
            </div>
          </section>

          <!-- SIDE : 실시간 정보 등 -->
          <aside class="panel panel-stack">
            <!-- 실시간 세계 날씨 (지도 + 핀 + 모달) -->
            <section class="panel-section">
              <div class="panel-header">
                <span class="eyebrow">WEATHER</span>
                <h2 class="panel-title">실시간 세계 날씨</h2>
                <p class="panel-desc">
                  핀을 클릭해 나라별 날씨 정보를 확인해보세요.
                </p>
              </div>
              <div
                class="world-map"
                id="worldMap"
                aria-label="도시별 실시간 시각/날씨 지도"
              >
                <img
                  src="/media/world-map.jpg"
                  alt="세계지도"
                  class="world-map-illustration"
                />
                <!-- realtimeInfo.js으로 핀과 모달을 이 안에 추가 -->
              </div>
            </section>

            <!-- 자바스크립트 챌린지: 업다운 게임 / 성적 계산기 / 내 가방 보기 -->
            <section class="panel-section">
              <div class="panel-header">
                <span class="eyebrow">CHALLENGE</span>
                <h2 class="panel-title">MINI GAMES</h2>
                <p class="panel-desc">간단한 미니 게임을 즐겨보세요.</p>
              </div>
              <div
                class="mini-game-list"
                id="miniGameList"
                aria-label="자바스크립트 챌린지 목록"
              >
                <!-- 업다운 게임 카드 -->
                <button
                  type="button"
                  id="updownStartBtn"
                  class="mini-game-card"
                >
                  <img
                    src="/media/updown-thumnail.png"
                    alt="Up & Down! thumnail"
                    class="mini-game-card-thumb"
                  />
                  <span class="mini-game-card-title">Up & Down!</span>
                </button>

                <!-- 성적 계산기 카드 -->
                <button type="button" id="gradeStartBtn" class="mini-game-card">
                  <img
                    src="/media/calculator-thumnail.png"
                    alt="Grade Calculator thumnail"
                    class="mini-game-card-thumb"
                  />
                  <span class="mini-game-card-title">Grade Calculator</span>
                </button>

                <!-- 내 가방 보기 카드 -->
                <button type="button" id="bagStartBtn" class="mini-game-card">
                  <img
                    src="/media/bag-thumnail.png"
                    alt="What's in my bag? thumnail"
                    class="mini-game-card-thumb"
                  />
                  <span class="mini-game-card-title">What's in my bag?</span>
                </button>
              </div>
            </section>
          </aside>
        </div>

        <site-footer></site-footer>
      </div>
    </div>

    <script>
      const track = document.getElementById("track");
      const dotsEl = document.getElementById("dots");

      const realSlides = Array.from(track.children);
      const total = realSlides.length;

      // Infinite Loop Clones
      const firstClone = realSlides[0].cloneNode(true);
      const lastClone = realSlides[total - 1].cloneNode(true);

      track.insertBefore(lastClone, realSlides[0]);
      track.appendChild(firstClone);

      let index = 1;

      function setTransform(withTransition = true) {
        track.style.transition = withTransition
          ? "transform 0.4s ease"
          : "none";
        track.style.transform = `translateX(-${index * 100}%)`;
      }

      function updateDots() {
        const realIndex = (index - 1 + total) % total;
        [...dotsEl.children].forEach((dot, i) => {
          dot.classList.toggle("active", i === realIndex);
        });
      }

      // Generate Navigation Dots
      realSlides.forEach((_, i) => {
        const dot = document.createElement("button");
        dot.className = "carousel-dot" + (i === 0 ? " active" : "");
        dot.setAttribute("aria-label", `${i + 1}번째 소식으로 이동`);
        dot.addEventListener("click", () => {
          index = i + 1;
          setTransform();
          updateDots();
        });
        dotsEl.appendChild(dot);
      });

      // Loop Shift Reset on Transition End
      track.addEventListener("transitionend", () => {
        if (index === total + 1) {
          index = 1;
          setTransform(false);
        } else if (index === 0) {
          index = total;
          setTransform(false);
        }
      });

      // Initial Position Setup
      setTransform(false);
    </script>
    <!-- Up-Down 숫자 맞추기 게임 -->
    <script src="/script/upDown.js"></script>
    <!-- 성적 계산기 -->
    <script src="/script/grade.js"></script>
    <!-- 내 가방 보기 -->
    <script src="/script/bag.js"></script>
    <!-- 실시간 세계 날씨 (모듈 분리: weatherAPI.js(데이터 패칭) + realtimeInfo.js(UI 제작)) -->
    <script type="module" src="/script/realtimeInfo.js"></script>
  </body>
</html>
