<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PROFILE</title>
    <link
      href="https://cdn.jsdelivr.net/gh/webfontworld/neodgm/neodgm.css"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/style.css" />
    <script src="/script/components.js" defer></script>

    <style>
      /* ============ PROFILE PAGE EXCLUSIVE STYLES ============ */
      .profile-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 1.5rem;
        margin-bottom: 4rem;
      }

      @media (min-width: 48rem) {
        .profile-grid {
          grid-template-columns: repeat(2, 1fr);
        }
      }

      /* 리스트 및 설명 리스트 커스텀 스타일 */
      .profile-list {
        list-style: none;
        padding: 0;
      }
      .profile-list li,
      .profile-list dt {
        padding: 0.75rem 0;
        border-bottom: 1px solid var(--line);
        font-family: var(--font-mono);
        font-size: 0.875rem;
        transition: color 0.2s;
      }

      .profile-list li:hover,
      .profile-list dt:hover {
        color: var(--accent);
      }

      .profile-list dd {
        margin: 0 0 1rem 0;
        font-size: 0.8125rem;
        color: var(--ink-soft);
        line-height: 1.6;
      }

      .highlight {
        background: var(--accent-soft);
        color: var(--accent);
        padding: 0.2rem 0.4rem;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="inner">
        <site-header active="myProfile"></site-header>

        <section class="hero">
          <span class="eyebrow">ABOUT ME</span>
          <h1 class="hero-title">MY PROFILE</h1>
          <p class="hero-desc">
            제가 좋아하는 것들과 올해의 계획, 그리고 저를 표현하는 단어들입니다.
          </p>
        </section>

        <main class="profile-grid">
          <section class="panel">
            <h2 class="section-subtitle">내가 좋아하는 음식</h2>
            <ul class="profile-list">
              <li>국물이 시원한 면요리</li>
              <li>깔끔담백한 디저트</li>
            </ul>
          </section>

          <section class="panel">
            <h2 class="section-subtitle">올해 할 일</h2>
            <ol class="profile-list">
              <li>하루 가볍게 책 한 문장 읽기</li>
              <li>건강한 몸 만들기</li>
              <li>나만의 포트폴리오 사이트 만들기</li>
              <li><span class="highlight">취뽀 성공하기!</span></li>
            </ol>
          </section>

          <section class="panel" style="grid-column: 1 / -1">
            <h2 class="section-subtitle">나를 설명하는 단어들</h2>
            <dl class="profile-list">
              <dt>소통왕</dt>
              <dd>
                학생들부터 어른분들까지 다양한 세대와 소통하는 걸 좋아해요.
              </dd>
              <dt>미니멀보다 맥시멀</dt>
              <dd>
                모던한 디자인도 좋지만 나만의 개성이 들어간 디자인도 좋아요.
              </dd>
            </dl>
          </section>
        </main>

        <site-footer note="프로필 버전 작성일: 2026년 7월 15일"></site-footer>
      </div>
    </div>
  </body>
</html>
