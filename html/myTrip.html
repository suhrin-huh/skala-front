<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TRIP</title>
    <!-- 폰트 관련 자원 -->
    <link
      href="https://cdn.jsdelivr.net/gh/webfontworld/neodgm/neodgm.css"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <!-- 전역 스타일 -->
    <link rel="stylesheet" href="/css/style.css" />
    <!-- 커스텀 웹 컴포넌트 -->
    <script src="/script/components.js" defer></script>
    <script src="/script/travelAlbum.js" type="module"></script>
    <script src="/script/musicPlayer.js" type="module"></script>
  </head>
  <body>
    <div class="page">
      <div class="inner">
        <site-header active="myTrip"></site-header>

        <section class="hero">
          <span class="eyebrow">TRAVEL LOG</span>
          <h1 class="hero-title">MY TRIP</h1>
          <p class="hero-desc">
            기억하고 싶은 여행의 기록들을 담은 아카이브입니다.
          </p>
          <p class="hero-desc">
            <span class="highlight">우측 헤드셋 아이콘</span>으로 플레이어를
            재생해 음악을 함께 즐겨보세요.
          </p>
        </section>
        <hr class="divider" />
        <main>
          <section class="travel-section-container">
            <travel-album></travel-album>
          </section>
        </main>

        <site-footer></site-footer>
      </div>
    </div>

    <music-player></music-player>
  </body>
</html>
