<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 여행지</title>
</head>
<body>
    <header>
        <h1>✈️ 나의 여행지</h1>
    </header>
    <main>
        <section>
            <h2>🎵 나의 여행 앨범</h2>
            <audio controls>
                <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
                브라우저가 audio 태그를 지원하지 않습니다.
            </audio>
            <figure>
                <img src="../media/bali.jpg" alt="발리" width="400">
                <figcaption>발리</figcaption>
            </figure>
            <figure>
                <img src="../media/greece.jpeg" alt="그리스" width="400">
                <figcaption>그리스</figcaption>
            </figure>
            <figure>
                <img src="../media/osaka.webp" alt="오사카" width="400">
                <figcaption>오사카</figcaption>
            </figure>
        </section>
        <hr>
        <section>
            <h2>🎬 나의 여행 브이로그</h2>
            <figure>
                <video controls width="500">
                    <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
                    브라우저가 video 태그를 지원하지 않습니다.
                </video>
                <figcaption>여행의 아름다운 순간들</figcaption>
            </figure>
        </section>
    </main> 
</body>
</html>
