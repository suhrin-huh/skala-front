<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HOLIDAY</title>

    <link
      href="https://cdn.jsdelivr.net/gh/webfontworld/neodgm/neodgm.css"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="/css/style.css" />
    <script src="/script/components.js" defer></script>
  </head>
  <body>
    <div class="page">
      <div class="inner">
        <site-header active="myHoliday"></site-header>

        <section class="hero">
          <span class="eyebrow">DAY OFF</span>
          <h1 class="hero-title">MY HOLIDAY</h1>
          <p class="hero-desc">
            여유로운 늦잠부터 나만의 사이트 개발까지, 온전히 나를 위해 채우는
            휴일의 타임라인입니다.
          </p>
          <p class="hero-desc">
            <span class="highlight">하단의 타임라인을 클릭</span>하여 세부
            일정을 확인하세요.
          </p>
        </section>

        <hr class="divider" />

        <!-- 수정한 Main 영역 (Interactive Panorama) -->
        <main>
          <div class="panorama-container state-0" id="panoramaWrapper">
            <!-- Layer 1: 하늘 -->
            <div class="layer-1-sky" id="skyPanorama"></div>

            <!-- Layer 2: 환경 -->
            <div class="layer-2-environment">
              <div class="stars"></div>
              <div class="sun"></div>
              <div class="moon"></div>
              <!-- 빌딩이 동적으로 생성될 컨테이너 -->
              <div class="cityscape" id="cityscape"></div>
            </div>

            <!-- Layer 3: UI -->
            <div class="layer-3-ui">
              <div class="memo-board">
                <div class="memo-content" id="memoContent">
                  <!-- JS로 주입 -->
                </div>
              </div>

              <div class="timeline-controller" id="timelineDots">
                <!-- JS로 8개의 점 주입 -->
              </div>
            </div>
          </div>

          <div class="meta-info">휴일 버전 업데이트: 2026년 7월 15일</div>
        </main>

        <site-footer></site-footer>
      </div>
    </div>
    <!-- 스크립트 파일 연결 -->
    <script src="/script/holiday.js" defer></script>
  </body>
</html>
