<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SIGNUP</title>
    <link
      href="https://cdn.jsdelivr.net/gh/webfontworld/neodgm/neodgm.css"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />

    <link href="/css/style.css" rel="stylesheet" />
    <script src="/script/components.js" defer></script>
  </head>
  <body>
    <div class="page">
      <div class="inner">
        <!-- COMMON ELEMENT : HEADER -->
        <site-header active="signUp"></site-header>

        <!-- 페이지별 소개글 -->
        <section class="hero">
          <span class="eyebrow">JOIN US</span>
          <h1 class="hero-title">SIGN UP</h1>
          <p class="hero-desc">
            여러분의 이야기도 궁금해요. 회원가입 후 방명록을 남겨주세요.
          </p>
        </section>
        <hr class="divider" />
        <main class="signup-form-container">
          <form id="signUpForm" class="form-container">
            <div class="step-bar">
              <div class="step-item active" id="step1-tab">
                STEP 1. 계정 정보
              </div>
              <div class="step-item" id="step2-tab">STEP 2. 프로필 정보</div>
              <div class="step-item" id="step3-tab">STEP 3. 자기소개</div>
            </div>

            <div class="form-carousel">
              <fieldset class="form-slide active" id="slide-1">
                <legend>계정 정보</legend>
                <div class="form-group">
                  <label class="form-label" for="userId">
                    아이디
                    <span class="required-mark" aria-hidden="true">*</span>
                  </label>
                  <input
                    class="form-control"
                    type="text"
                    id="userId"
                    name="userId"
                    placeholder="4-16자 영문/숫자"
                    minlength="4"
                    maxlength="16"
                    required
                  />
                </div>

                <div class="form-group">
                  <label class="form-label" for="userPw">
                    비밀번호
                    <span class="required-mark" aria-hidden="true">*</span>
                  </label>
                  <input
                    class="form-control"
                    type="password"
                    id="userPw"
                    name="userPw"
                    placeholder="8자 이상 입력"
                    minlength="8"
                    required
                  />
                </div>

                <div class="form-group">
                  <label class="form-label" for="userEmail">
                    이메일
                    <span class="required-mark" aria-hidden="true">*</span>
                  </label>
                  <div class="email-group">
                    <input
                      class="form-control"
                      type="text"
                      id="userEmail"
                      name="userEmail"
                      placeholder="example"
                      required
                    />
                    <span>@</span>
                    <select
                      class="form-control"
                      id="emailDomain"
                      name="emailDomain"
                    >
                      <option value="direct">직접 입력</option>
                      <option value="gmail.com">gmail.com</option>
                      <option value="naver.com">naver.com</option>
                      <option value="daum.net">daum.net</option>
                    </select>
                  </div>
                </div>
              </fieldset>

              <fieldset class="form-slide" id="slide-2">
                <legend>개인 프로필 정보</legend>

                <div class="form-group">
                  <label class="form-label" for="userName">이름</label>
                  <input
                    class="form-control"
                    type="text"
                    id="userName"
                    name="userName"
                    placeholder="이름을 입력해 주세요"
                  />
                </div>

                <div class="form-group">
                  <label class="form-label" for="birthDate">생년월일</label>
                  <input
                    class="form-control"
                    type="date"
                    id="birthDate"
                    name="birthDate"
                  />
                </div>

                <div class="form-group">
                  <span class="form-label">성별</span>
                  <div class="option-list">
                    <label class="option-item" for="genderM">
                      <input
                        type="radio"
                        id="genderM"
                        name="gender"
                        value="male"
                      />
                      남성
                    </label>
                    <label class="option-item" for="genderF">
                      <input
                        type="radio"
                        id="genderF"
                        name="gender"
                        value="female"
                      />
                      여성
                    </label>
                    <label class="option-item" for="genderN">
                      <input
                        type="radio"
                        id="genderN"
                        name="gender"
                        value="none"
                        checked
                      />
                      선택안함
                    </label>
                  </div>
                </div>

                <div class="form-group align-start">
                  <span class="form-label">관심 분야</span>
                  <div class="checkbox-stack">
                    <label class="option-item" for="interestFE">
                      <input
                        type="checkbox"
                        id="interestFE"
                        name="interest"
                        value="frontend"
                      />
                      웹 프론트엔드 (Vue.js/HTML)
                    </label>
                    <label class="option-item" for="interestUX">
                      <input
                        type="checkbox"
                        id="interestUX"
                        name="interest"
                        value="uiux"
                      />
                      UI/UX 디자인 표준
                    </label>
                    <label class="option-item" for="interestBE">
                      <input
                        type="checkbox"
                        id="interestBE"
                        name="interest"
                        value="backend"
                      />
                      백엔드 &amp; 데이터베이스
                    </label>
                    <label class="option-item" for="interestCloud">
                      <input
                        type="checkbox"
                        id="interestCloud"
                        name="interest"
                        value="cloud"
                      />
                      클라우드 &amp; 인프라
                    </label>
                  </div>
                </div>

                <div class="form-group">
                  <label class="form-label" for="joinPath">가입 경로</label>
                  <select class="form-control" id="joinPath" name="joinPath">
                    <option value="">-- 선택해 주세요 --</option>
                    <option value="search">검색 엔진</option>
                    <option value="sns">SNS</option>
                    <option value="friend">지인 추천</option>
                    <option value="ad">광고</option>
                    <option value="etc">기타</option>
                  </select>
                </div>
              </fieldset>

              <fieldset class="form-slide" id="slide-3">
                <legend>자기소개</legend>
                <div
                  class="form-group"
                  style="grid-template-columns: 1fr; gap: 0.75rem"
                >
                  <label class="form-label" for="introduce"
                    >나를 표현하는 한 줄 소개 또는 가입 인사 (최대 200자)</label
                  >
                  <textarea
                    class="form-control"
                    id="introduce"
                    name="introduce"
                    rows="5"
                    maxlength="200"
                    placeholder="여기에 내용을 입력하세요"
                    style="resize: vertical; min-height: 6rem"
                  ></textarea>
                </div>
              </fieldset>

              <p
                class="form-error-message"
                id="signUpFormError"
                role="alert"
                hidden
              ></p>

              <div class="carousel-footer">
                <button
                  type="button"
                  class="btn btn-secondary btn-reset"
                  id="btn-reset"
                >
                  다시 작성
                </button>

                <button
                  type="button"
                  class="btn btn-secondary btn-nav"
                  id="btn-prev"
                  style="display: none"
                >
                  이전
                </button>
                <button
                  type="button"
                  class="btn btn-primary btn-nav"
                  id="btn-next"
                >
                  다음 단계
                </button>
                <button
                  type="submit"
                  class="btn btn-primary btn-nav"
                  id="btn-submit"
                  style="display: none"
                >
                  회원가입
                </button>
              </div>
            </div>
          </form>

          <!-- 회원가입 완료 모달 (stamp) -->
          <div class="modal-backdrop" id="signupCompleteModal">
            <div
              class="modal-box modal-box--form is-stamp"
              id="signupCompleteBox"
              role="dialog"
              aria-modal="true"
              aria-label="회원가입 완료"
            >
              <button
                class="modal-close"
                id="signupCompleteCloseBtn"
                aria-label="닫기"
              >
                ×
              </button>
              <div class="stamp-seal">DONE</div>
              <h2 class="modal-title">회원가입이 완료되었습니다</h2>
              <p class="modal-desc">환영해요!</p>
              <p class="modal-desc">
                아래 버튼을 누르면 안내 페이지로 이동합니다.
              </p>
              <div class="modal-actions">
                <button
                  type="button"
                  class="btn btn-primary btn-nav"
                  id="signupCompleteConfirmBtn"
                >
                  확인
                </button>
              </div>
            </div>
          </div>

          <!-- 다시 작성 확인 모달 -->
          <div class="modal-backdrop" id="resetConfirmModal">
            <div
              class="modal-box modal-box--form"
              id="resetConfirmBox"
              role="dialog"
              aria-modal="true"
              aria-label="다시 작성 확인"
            >
              <button
                class="modal-close"
                id="resetConfirmCloseBtn"
                aria-label="닫기"
              >
                ×
              </button>
              <h2 class="modal-title">다시 작성하시겠습니까?</h2>
              <p class="modal-desc">
                작성 중인 모든 정보가 사라지고 첫 번째 단계로 돌아갑니다.
              </p>
              <div class="modal-actions modal-actions--confirm">
                <button
                  type="button"
                  class="btn btn-secondary btn-nav"
                  id="resetConfirmCancelBtn"
                >
                  취소
                </button>
                <button
                  type="button"
                  class="btn btn-primary btn-nav"
                  id="resetConfirmOkBtn"
                >
                  다시 작성
                </button>
              </div>
            </div>
          </div>
        </main>

        <site-footer></site-footer>
      </div>
    </div>

    <script>
      const form = document.getElementById("signUpForm");
      const slides = document.querySelectorAll(".form-slide");
      const tabs = document.querySelectorAll(".step-item");

      const btnPrev = document.getElementById("btn-prev");
      const btnNext = document.getElementById("btn-next");
      const btnSubmit = document.getElementById("btn-submit");
      const btnReset = document.getElementById("btn-reset");
      const formError = document.getElementById("signUpFormError");
      const btnSubmitDefaultText = btnSubmit.textContent;

      // 이미 로그인된 상태로 회원가입 페이지에 접근하면 메인으로 돌려보낸다.
      (async () => {
        try {
          const { getCurrentUser } = await import("/supabase/action.js");
          const user = await getCurrentUser();
          if (user) {
            window.location.href = "index.html";
          }
        } catch {
          // Supabase 연동 실패 시에는 회원가입 페이지를 그대로 보여준다.
        }
      })();

      let currentStep = 1; // 1, 2, 3 단계 관리
      const totalSteps = slides.length;

      // 단계 UI 업데이트 핵심 함수
      function updateStepUI() {
        // 1. 슬라이드 노출 설정
        slides.forEach((slide, idx) => {
          slide.classList.toggle("active", idx + 1 === currentStep);
        });

        // 2. 상단 Step 탭 활성화 클래스 조절
        tabs.forEach((tab, idx) => {
          tab.classList.toggle("active", idx + 1 === currentStep);
        });

        // 3. 버튼 상태 세부 조절
        if (currentStep === 1) {
          btnPrev.style.display = "none";
          btnNext.style.display = "inline-block";
          btnSubmit.style.display = "none";
        } else if (currentStep === totalSteps) {
          btnPrev.style.display = "inline-block";
          btnNext.style.display = "none";
          btnSubmit.style.display = "inline-block";
        } else {
          btnPrev.style.display = "inline-block";
          btnNext.style.display = "inline-block";
          btnSubmit.style.display = "none";
        }
      }

      // 다음 단계 핸들러 (유효성 검사 적용)
      btnNext.addEventListener("click", () => {
        // 현재 활성화된 슬라이드 내부에 필수(required) 요소가 입력되었는지 실시간 체크!
        const currentActiveSlide = document.querySelector(".form-slide.active");
        const requiredInputs =
          currentActiveSlide.querySelectorAll("[required]");

        let allValid = true;
        requiredInputs.forEach((input) => {
          if (!input.checkValidity()) {
            input.reportValidity(); // 브라우저가 제공하는 빌트인 검사 말풍선 강제 노출
            allValid = false;
          }
        });

        if (allValid && currentStep < totalSteps) {
          currentStep++;
          updateStepUI();
        }
      });

      // 이전 단계 핸들러
      btnPrev.addEventListener("click", () => {
        if (currentStep > 1) {
          currentStep--;
          updateStepUI();
        }
      });

      // 공통 모달 열기/닫기
      function openModal(modalEl) {
        modalEl.classList.add("open");
        requestAnimationFrame(() => {
          modalEl.classList.add("show");
        });
        document.body.style.overflow = "hidden";
      }

      function closeModal(modalEl) {
        modalEl.classList.remove("show");
        document.body.style.overflow = "";
        setTimeout(() => {
          modalEl.classList.remove("open");
        }, 250);
      }

      // 리셋 기능 고도화 (전체 초기화 및 1단계 귀환) - 확인 모달 경유
      const resetConfirmModal = document.getElementById("resetConfirmModal");
      const resetConfirmCloseBtn = document.getElementById(
        "resetConfirmCloseBtn",
      );
      const resetConfirmCancelBtn = document.getElementById(
        "resetConfirmCancelBtn",
      );
      const resetConfirmOkBtn = document.getElementById("resetConfirmOkBtn");

      btnReset.addEventListener("click", () => {
        openModal(resetConfirmModal);
      });

      resetConfirmCloseBtn.addEventListener("click", () =>
        closeModal(resetConfirmModal),
      );
      resetConfirmCancelBtn.addEventListener("click", () =>
        closeModal(resetConfirmModal),
      );
      resetConfirmModal.addEventListener("click", (e) => {
        if (e.target === resetConfirmModal) closeModal(resetConfirmModal);
      });
      resetConfirmOkBtn.addEventListener("click", () => {
        form.reset();
        currentStep = 1;
        updateStepUI();
        closeModal(resetConfirmModal);
      });

      // 회원가입 완료 모달 제어
      const completeModal = document.getElementById("signupCompleteModal");
      const completeCloseBtn = document.getElementById(
        "signupCompleteCloseBtn",
      );
      const completeConfirmBtn = document.getElementById(
        "signupCompleteConfirmBtn",
      );

      completeCloseBtn.addEventListener("click", () =>
        closeModal(completeModal),
      );
      completeModal.addEventListener("click", (e) => {
        if (e.target === completeModal) closeModal(completeModal);
      });
      document.addEventListener("keydown", (e) => {
        if (e.key !== "Escape") return;
        if (completeModal.classList.contains("open")) {
          closeModal(completeModal);
        }
        if (resetConfirmModal.classList.contains("open")) {
          closeModal(resetConfirmModal);
        }
      });

      // 확인 버튼 -> 모달을 닫고 안내 페이지로 이동
      completeConfirmBtn.addEventListener("click", () => {
        closeModal(completeModal);
        window.location.href = "signUpResult.html";
      });

      // 폼 에러 메시지 표시/초기화
      function showFormError(message) {
        if (!formError) return;
        formError.textContent = message;
        formError.hidden = false;
      }

      function clearFormError() {
        if (!formError) return;
        formError.textContent = "";
        formError.hidden = true;
      }

      // FormData -> signUp()이 요구하는 형태로 매핑
      function collectSignUpData() {
        const fd = new FormData(form);
        return {
          userId: (fd.get("userId") || "").trim(),
          userPw: fd.get("userPw") || "",
          userEmail: (fd.get("userEmail") || "").trim(),
          emailDomain: fd.get("emailDomain") || "",
          userName: (fd.get("userName") || "").trim(),
          birthDate: fd.get("birthDate") || "",
          gender: fd.get("gender") || "none",
          interests: fd.getAll("interest"),
          joinPath: fd.get("joinPath") || "",
          introduce: (fd.get("introduce") || "").trim(),
        };
      }

      // 완료 제출 핸들러: signUp() 호출 후 성공 시 stamp 모달, 실패 시 에러 메시지
      form.addEventListener("submit", async function (e) {
        e.preventDefault();
        clearFormError();

        const signUpData = collectSignUpData();

        btnSubmit.disabled = true;
        btnSubmit.textContent = "처리중";
        try {
          const { signUp } = await import("/supabase/action.js");
          const result = await signUp(signUpData);
          if (result.success) {
            openModal(completeModal);
          } else {
            showFormError("알 수 없는 오류가 발생하였습니다.");
          }
        } catch {
          showFormError("알 수 없는 오류가 발생하였습니다.");
        } finally {
          btnSubmit.disabled = false;
          btnSubmit.textContent = btnSubmitDefaultText;
        }
      });
    </script>
  </body>
</html>
